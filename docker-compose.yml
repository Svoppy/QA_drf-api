version: '3.9'

services:
  web:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=aitu-qa-dev-secret-key-2024
      - DEBUG=True
      - ALLOWED_HOSTS=localhost 127.0.0.1 0.0.0.0
    volumes:
      - ./app:/app
    restart: unless-stopped

  test:
    build: ./app
    environment:
      - SECRET_KEY=aitu-qa-test-secret-key
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=core.settings
    volumes:
      - ./app:/app
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             pytest tests/unit/ tests/integration/ -v --cov=. --cov-report=term-missing --cov-report=xml:tests/coverage.xml"
    profiles:
      - test
