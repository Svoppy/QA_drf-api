name: QA Pipeline — AITU Course Registration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install flake8
      - name: Lint with flake8
        run: flake8 app/ --max-line-length=120 --exclude=migrations

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r app/requirements.txt
      - name: Run migrations
        run: |
          cd app
          python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: core.settings
      - name: Seed database
        run: |
          cd app
          python manage.py seed
        env:
          DJANGO_SETTINGS_MODULE: core.settings
      - name: Run unit & integration tests with coverage
        run: |
          pytest tests/unit/ tests/integration/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
        env:
          DJANGO_SETTINGS_MODULE: core.settings
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  e2e-tests:
    name: End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r app/requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      - name: Start application
        run: |
          cd app
          python manage.py migrate
          python manage.py seed
          python manage.py runserver 0.0.0.0:8000 &
          sleep 3
        env:
          DJANGO_SETTINGS_MODULE: core.settings
      - name: Run E2E tests
        run: pytest tests/e2e/ --base-url=http://localhost:8000 -v
        env:
          DJANGO_SETTINGS_MODULE: core.settings

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aitu-course-reg ./app
