name: QA Pipeline — Habaneras de Lino

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Quality gates (enforced per job):
#   - Unit tests:        100% pass rate + ≥60% line coverage on store_app
#   - Integration tests: 100% pass rate + all responses < 500ms
#   - E2E tests:         100% pass rate on admin login / dashboard flows

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests (fast, no Docker, SQLite in-memory)
  # ─────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests + Coverage Gate (≥60%)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SUT dependencies
        run: pip install -r sut/habaneras-de-lino-drf-api/requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests with coverage quality gate
        # Gate: ≥80% on models.py (business logic layer).
        # Full-app 60% target is measured after integration tests add view/serializer coverage.
        run: |
          python -m pytest tests/unit/ \
            --cov=store_app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -v
        env:
          DJANGO_SETTINGS_MODULE: habaneras_de_lino_drf_api.settings.test
          PYTHONPATH: sut/habaneras-de-lino-drf-api

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Integration Tests (requires full Docker stack)
  # ─────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests (Docker SUT)"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SUT with Docker Compose
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose up -d --build

      - name: Wait for SUT to be healthy (max 150s)
        run: |
          echo "Waiting for SUT at http://localhost:8002 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8002/store/clothing-collections/ > /dev/null 2>&1; then
              echo "SUT ready after approx $((i * 5))s"
              exit 0
            fi
            echo "  attempt $i/30 — sleeping 5s"
            sleep 5
          done
          echo "ERROR: SUT did not become healthy in time"
          docker compose -f sut/habaneras-de-lino-drf-api/docker-compose.yml logs --tail=40
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ \
            -v --tb=short \
            --junit-xml=integration-results.xml

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-results.xml

      - name: Dump Docker logs on failure
        if: failure()
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose logs --tail=60

      - name: Stop containers
        if: always()
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose down

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: E2E Tests (Playwright browser automation)
  # ─────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E Tests (Playwright / Chromium)"
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SUT with Docker Compose
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose up -d --build

      - name: Wait for SUT to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8002/store/clothing-collections/ > /dev/null 2>&1; then
              echo "SUT ready"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Playwright Chromium + system deps
        run: python -m playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ \
            -v --tb=short \
            --junit-xml=e2e-results.xml

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-results.xml

      - name: Stop containers
        if: always()
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose down
