name: QA Pipeline - Habaneras de Lino

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Unit Tests (no Docker, SQLite in-memory)
  # Quality gate: 100% pass rate + >=40% line coverage on store_app
  unit-tests:
    name: "Unit Tests + Coverage Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install SUT dependencies
        run: pip install -r sut/habaneras-de-lino-drf-api/requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ \
            --cov=store_app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -v
        env:
          DJANGO_SETTINGS_MODULE: habaneras_de_lino_drf_api.settings.test
          PYTHONPATH: sut/habaneras-de-lino-drf-api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # JOB 2: Integration Tests (requires full Docker stack)
  # Quality gate: 100% pass rate, all GET endpoints < 500ms
  integration-tests:
    name: "Integration Tests (Docker SUT)"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        working-directory: sut/habaneras-de-lino-drf-api
        run: |
          cat > habaneras_de_lino_drf_api/settings/.env <<'EOF'
          CURRENT_ENV=DOCKER
          DOCKER_SECRET_KEY=ci-secret-key-not-for-production
          DOCKER_DB_NAME=docker_habanerasdelino_db
          DOCKER_DB_USER=docker_habanerasdelino_user
          DOCKER_DB_PASSWORD=docker_habanerasdelinouser!
          DOCKER_DB_HOST=db
          DOCKER_DB_PORT=5432
          DOCKER_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder
          DOCKER_STRIPE_SECRET_KEY=sk_test_placeholder
          EOF

      - name: Start SUT with Docker Compose
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose up -d --build

      - name: Wait for SUT to be healthy (max 150s)
        run: |
          echo "Waiting for SUT at http://localhost:8002 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8002/store/clothing-collections/ > /dev/null 2>&1; then
              echo "SUT ready after approx $((i * 5))s"
              exit 0
            fi
            echo "  attempt $i/30 - sleeping 5s"
            sleep 5
          done
          echo "ERROR: SUT did not become healthy in time"
          docker compose -f sut/habaneras-de-lino-drf-api/docker-compose.yml logs --tail=40
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ \
            -v --tb=short \
            --junit-xml=integration-results.xml

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-results.xml

      - name: Dump Docker logs on failure
        if: failure()
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose logs --tail=60

      - name: Stop containers
        if: always()
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose down

  # JOB 3: E2E Tests (Playwright browser automation)
  # Quality gate: 100% pass rate on admin login / dashboard flows
  e2e-tests:
    name: "E2E Tests (Playwright Chromium)"
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        working-directory: sut/habaneras-de-lino-drf-api
        run: |
          cat > habaneras_de_lino_drf_api/settings/.env <<'EOF'
          CURRENT_ENV=DOCKER
          DOCKER_SECRET_KEY=ci-secret-key-not-for-production
          DOCKER_DB_NAME=docker_habanerasdelino_db
          DOCKER_DB_USER=docker_habanerasdelino_user
          DOCKER_DB_PASSWORD=docker_habanerasdelinouser!
          DOCKER_DB_HOST=db
          DOCKER_DB_PORT=5432
          DOCKER_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder
          DOCKER_STRIPE_SECRET_KEY=sk_test_placeholder
          EOF

      - name: Start SUT with Docker Compose
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose up -d --build

      - name: Wait for SUT to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8002/store/clothing-collections/ > /dev/null 2>&1; then
              echo "SUT ready"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ \
            -v --tb=short \
            --junit-xml=e2e-results.xml

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-results.xml

      - name: Stop containers
        if: always()
        working-directory: sut/habaneras-de-lino-drf-api
        run: docker compose down