{% extends "base.html" %}
{% block title %}Login — AITU{% endblock %}
{% block content %}
<div style="max-width:400px; margin:2rem auto;">
    <div class="card">
        <h2 style="margin-bottom:1.5rem; text-align:center;">Student Login</h2>
        <form method="post" id="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Login</button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:#757575;">
            Don't have an account? <a href="/users/register/" style="color:#1a237e;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
