{% extends "base.html" %}
{% block title %}Profile — AITU{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
    <h2 style="margin-bottom:1rem;">{{ user.get_full_name }}</h2>
    <p style="color:#757575;">@{{ user.username }}</p>
    <p style="color:#757575;">{{ user.email }}</p>
    <hr style="margin:1rem 0; border:none; border-top:1px solid #eee;">
    <p><strong>Active Enrollments:</strong> {{ enrollments|length }}</p>
    <p><strong>Total Credits (enrolled):</strong> {{ total_credits }}</p>
    <div style="margin-top:1rem;">
        <a href="/courses/my/" class="btn btn-primary">View My Courses</a>
    </div>
</div>
{% endblock %}
