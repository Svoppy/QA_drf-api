[pytest]
DJANGO_SETTINGS_MODULE = habaneras_de_lino_drf_api.settings.test
pythonpath = sut/habaneras-de-lino-drf-api
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -v
markers =
    unit: Unit tests (no running app needed)
    integration: Integration tests (requires running app)
    e2e: E2E browser tests (requires running app + playwright)
filterwarnings =
    ignore::DeprecationWarning