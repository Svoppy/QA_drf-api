[pytest]
DJANGO_SETTINGS_MODULE = core.settings
pythonpath = app
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (models, forms)
    integration: Integration tests (views, workflows)
    e2e: End-to-end tests (Playwright, requires running server)
    slow: Slow tests
filterwarnings =
    ignore::DeprecationWarning
